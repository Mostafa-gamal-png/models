<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نماذج الشركة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f4f2ef;color:#1a1a1a;direction:rtl}
.screen{display:none;min-height:100vh}.screen.on{display:flex;flex-direction:column}
.topbar{background:white;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;align-items:center;height:54px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:15px;font-weight:700;color:#111;flex:1}
.topbar-logo span{color:#2563eb}
.tbtn{padding:7px 14px;border-radius:7px;border:1px solid #e5e7eb;background:white;cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s;color:#374151;white-space:nowrap}
.tbtn:hover{background:#f3f4f6}
.tbtn.gr{background:#059669;color:white;border-color:#059669}.tbtn.gr:hover{background:#047857}
.tbtn.pr{background:#2563eb;color:white;border-color:#2563eb}.tbtn.pr:hover{background:#1d4ed8}
.sep{width:1px;height:26px;background:#e5e7eb;margin:0 3px;flex-shrink:0}
.content{flex:1;padding:28px 24px}
.section-title{font-size:18px;font-weight:700;color:#111;margin-bottom:6px}
.section-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.tpl-card{background:white;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s}
.tpl-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#3b82f6}
.tpl-thumb{height:130px;background:linear-gradient(135deg,#dbeafe,#eff6ff);display:flex;align-items:center;justify-content:center;font-size:44px}
.tpl-info{padding:12px}
.tpl-name{font-size:14px;font-weight:600;color:#111;margin-bottom:4px}
.tpl-meta{font-size:11px;color:#9ca3af;margin-bottom:10px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:#6b7280;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
.empty-state .icon{font-size:48px;margin-bottom:12px}
#sc-editor{height:100vh;overflow:hidden}
#editor-inner{display:flex;flex-direction:column;height:100vh}
#toolbar2{background:white;border-bottom:1px solid #e5e7eb;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#main{display:flex;flex:1;overflow:hidden}
#canvas-area{flex:1;overflow:auto;background:#d1cfc8;display:flex;align-items:flex-start;justify-content:center;padding:24px}
#pdf-wrapper{position:relative;display:inline-block;box-shadow:0 4px 20px rgba(0,0,0,.2);flex-shrink:0}
#pdf-img{display:block}
.fov{position:absolute;overflow:hidden;pointer-events:none}
.fval{padding:0 4px;width:100%;direction:rtl;word-break:break-word;overflow:hidden;line-height:1.3;padding-top:2px}
#sidebar{width:280px;border-right:1px solid #e5e7eb;background:white;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-title{font-size:13px;font-weight:600;color:#374151;padding:14px 14px 8px}
.ffield{margin:0 10px 10px;padding:10px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
.fflbl{font-size:11.5px;color:#6b7280;margin-bottom:5px;display:flex;align-items:center;gap:5px;font-weight:500}
.ffinp{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13.5px;font-family:inherit;direction:rtl;background:white}
.ffinp:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.tbox{margin-top:6px;padding:7px 10px;background:#d1fae5;border-radius:6px;font-size:12px;color:#065f46;direction:rtl;line-height:1.5}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.bt{background:#dbeafe;color:#1e40af}.bn{background:#fef3c7;color:#92400e}
.bd{background:#dcfce7;color:#166534}.btf{background:#f3e8ff;color:#7e22ce}
#pnav{background:white;border-top:1px solid #e5e7eb;padding:8px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:13px;flex-shrink:0}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#111827;color:white;padding:9px 18px;border-radius:8px;font-size:13px;transition:transform .28s;z-index:9999;pointer-events:none}
#toast.on{transform:translateX(-50%) translateY(0)}
/* ── not-configured screen ── */
#sc-nocfg{align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f,#2563eb)}
.cfg-card{background:white;border-radius:16px;padding:32px;width:400px;text-align:center}
.cfg-card h2{font-size:18px;font-weight:700;margin-bottom:10px}
.cfg-card p{font-size:13px;color:#6b7280;line-height:1.6}
</style>
</head>
<body>

<!-- Not configured -->
<div class="screen" id="sc-nocfg">
  <div class="cfg-card">
    <div style="font-size:48px;margin-bottom:12px">⚙️</div>
    <h2>النظام غير مُعدّ</h2>
    <p>هذه الصفحة للمستخدمين فقط.<br>للإعداد يرجى التواصل مع مسؤول النظام.</p>
  </div>
</div>

<!-- Home -->
<div class="screen" id="sc-home">
  <div class="topbar">
    <div class="topbar-logo">نماذج <span>الشركة</span></div>
  </div>
  <div class="content">
    <div class="section-title">النماذج المتاحة</div>
    <div class="section-sub">اختر نموذجاً لملء بياناته وطباعته</div>
    <div id="templates-grid" class="templates-grid">
      <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
    </div>
  </div>
</div>

<!-- Editor (fill only) -->
<div class="screen" id="sc-editor">
  <div id="editor-inner">
    <div id="toolbar2">
      <button class="tbtn" onclick="goHome()">← رجوع</button>
      <div class="sep"></div>
      <span id="tpl-title2" style="font-size:14px;font-weight:600;color:#111"></span>
      <div style="flex:1"></div>
      <button class="tbtn" onclick="clearVals()">🔄 مسح</button>
      <button class="tbtn gr" onclick="printA4()">🖨️ طباعة A4</button>
    </div>
    <div id="main">
      <div id="canvas-area">
        <div id="pdf-wrapper">
          <img id="pdf-img" alt="">
        </div>
      </div>
      <div id="sidebar">
        <div class="sidebar-title">📝 أدخل البيانات</div>
        <div id="fill-form"></div>
        <div id="fill-empty" style="text-align:center;color:#9ca3af;font-size:13px;padding:24px;display:none">لا توجد حقول في هذا النموذج</div>
      </div>
    </div>
    <div id="pnav">
      <button class="tbtn" id="btn-prev" onclick="goPage(-1)">◀ السابق</button>
      <span id="pinfo">الصفحة 1 من 1</span>
      <button class="tbtn" id="btn-next" onclick="goPage(1)">التالي ▶</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ CONFIG — يُضبط من admin.html تلقائياً ══
const SUPABASE_URL = localStorage.getItem('cfg_url') || '';
const SUPABASE_KEY = localStorage.getItem('cfg_key') || '';

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let sb = null;
let pdf=null, page=1, pages=1, imgW=0, imgH=0;
let fields=[];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ══ Init ══
window.addEventListener('load', async ()=>{
  if(!SUPABASE_URL || !SUPABASE_KEY){ showScreen('sc-nocfg'); return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  showScreen('sc-home');
  loadTemplates();
});

// ══ Templates ══
async function loadTemplates(){
  const grid = document.getElementById('templates-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div> جاري التحميل...</div>';
  const {data, error} = await sb.from('templates').select('*').order('created_at',{ascending:false});
  if(error || !data?.length){
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>لا توجد نماذج متاحة بعد</p></div>';
    return;
  }
  grid.innerHTML = data.map(t=>`
    <div class="tpl-card" onclick="openTemplate('${t.id}')">
      <div class="tpl-thumb">📄</div>
      <div class="tpl-info">
        <div class="tpl-name">${t.name}</div>
        <div class="tpl-meta">${new Date(t.created_at).toLocaleDateString('ar-SA')}</div>
        <button class="tbtn pr" style="width:100%;justify-content:center">فتح وملء ←</button>
      </div>
    </div>`).join('');
}

async function openTemplate(id){
  const {data,error} = await sb.from('templates').select('*').eq('id',id).single();
  if(error||!data){ toast('خطأ في التحميل'); return; }
  fields = (data.fields||[]).map(f=>({...f,val:'',_raw:''}));
  document.getElementById('tpl-title2').textContent = data.name;
  const {data:urlData} = sb.storage.from('pdfs').getPublicUrl(data.pdf_path);
  showScreen('sc-editor');
  await loadPDF(urlData.publicUrl);
  renderFillForm();
  renderOverlays();
}

function goHome(){ showScreen('sc-home'); loadTemplates(); }

// ══ PDF ══
async function loadPDF(url){
  const buf = await (await fetch(url)).arrayBuffer();
  pdf = await pdfjsLib.getDocument({data:buf}).promise;
  pages = pdf.numPages; page = 1;
  await renderPage();
}
async function renderPage(){
  const pg = await pdf.getPage(page);
  const RS=2.5, DS=1.5;
  const vp = pg.getViewport({scale:RS});
  const oc = document.createElement('canvas');
  oc.width=vp.width; oc.height=vp.height;
  await pg.render({canvasContext:oc.getContext('2d'),viewport:vp}).promise;
  const blob = await new Promise(r=>oc.toBlob(r,'image/png'));
  const url = URL.createObjectURL(blob);
  const img = document.getElementById('pdf-img');
  if(img._blobUrl) URL.revokeObjectURL(img._blobUrl);
  img._blobUrl = url;
  imgW = Math.round(vp.width/RS*DS);
  imgH = Math.round(vp.height/RS*DS);
  img.src = url;
  await new Promise(r=>{img.onload=r;img.onerror=r;});
  img.style.width=imgW+'px'; img.style.height=imgH+'px';
  const wr = document.getElementById('pdf-wrapper');
  wr.style.width=imgW+'px'; wr.style.height=imgH+'px';
  document.getElementById('pinfo').textContent=`الصفحة ${page} من ${pages}`;
  document.getElementById('btn-prev').disabled=page<=1;
  document.getElementById('btn-next').disabled=page>=pages;
  renderOverlays();
}
async function goPage(d){const np=page+d;if(np>=1&&np<=pages){page=np;await renderPage();}}

// ══ Tafqeet ══
function n2w(n){
  n=Math.floor(n);if(n===0)return'صفر';
  const o=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
  const t=['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
  const h=['','مئة','مئتان','ثلاثمئة','أربعمئة','خمسمئة','ستمئة','سبعمئة','ثمانمئة','تسعمئة'];
  function g(x){if(x===0)return'';if(x<20)return o[x];const a=Math.floor(x/10),b=x%10;if(x<100)return b?o[b]+' و'+t[a]:t[a];const c=Math.floor(x/100),d=x%100;return d?h[c]+' و'+g(d):h[c];}
  const B=Math.floor(n/1e9),M=Math.floor((n%1e9)/1e6),T=Math.floor((n%1e6)/1e3),R=n%1e3;
  const p=[];
  if(B)p.push(B===1?'مليار':B===2?'ملياران':g(B)+(B<=10?' مليارات':' مليار'));
  if(M)p.push(M===1?'مليون':M===2?'مليونان':g(M)+(M<=10?' ملايين':' مليون'));
  if(T)p.push(T===1?'ألف':T===2?'ألفان':g(T)+(T<=10?' آلاف':' ألف'));
  if(R)p.push(g(R));
  return p.join(' و');
}
function tafqeet(v,cur=''){
  if(!v||isNaN(v))return'';
  const sub={'ريال سعودي':'هللة','دولار أمريكي':'سنت','درهم إماراتي':'فلس','دينار كويتي':'فلس','جنيه مصري':'قرش'};
  const n=parseFloat(v),i=Math.floor(n),d=Math.round((n-i)*100);
  if(!cur){let r='فقط '+n2w(i);if(d>0)r+=' و'+n2w(d)+' جزء من مئة';return r;}
  let r='فقط '+n2w(i)+' '+cur;
  if(d>0)r+=' و'+n2w(d)+' '+(sub[cur]||'فلس');
  return r;
}
function getFieldCur(f){ return f.currency||''; }
function getVal(f){
  if(f.type==='tafqeet'&&f.linkTo){const lf=fields.find(x=>x.id===f.linkTo);return lf?tafqeet(lf.val,getFieldCur(lf)):'';}
  return f.val;
}

// ══ Overlays ══
function renderOverlays(){
  const wr=document.getElementById('pdf-wrapper');
  wr.querySelectorAll('.fov').forEach(el=>el.remove());
  fields.filter(f=>f.pg===page).forEach(f=>{
    const d=document.createElement('div');
    d.className='fov';
    d.style.cssText=`left:${f.x}px;top:${f.y}px;width:${f.w}px;height:${f.h}px;position:absolute;`;
    const v=document.createElement('div');
    v.className='fval';
    v.style.cssText=`font-size:${f.fs}px;color:${f.col};text-align:${f.align};`;
    v.textContent=getVal(f)||'';
    d.appendChild(v); wr.appendChild(d);
  });
}

// ══ Fill Form ══
function typeLabel(t){return{text:'نص',number:'رقم',date:'تاريخ',tafqeet:'تفقيط'}[t]||t;}
function typeBadge(t){return{text:'bt',number:'bn',date:'bd',tafqeet:'btf'}[t]||'bt';}

function renderFillForm(){
  const fm=document.getElementById('fill-form'),em=document.getElementById('fill-empty');
  if(!fields.length){fm.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  fm.innerHTML=fields.map(f=>{
    if(f.type==='tafqeet'){
      const lf=fields.find(x=>x.id===f.linkTo);
      return`<div class="ffield"><div class="fflbl"><span class="badge btf">تفقيط</span> ${f.name}</div><div class="tbox" id="atf_${f.id}">${lf&&lf.val?tafqeet(lf.val,getFieldCur(lf)):'يُملأ تلقائياً'}</div></div>`;
    }
    const inp = f.type==='number'
      ?`<input type="number" class="ffinp" id="inp_${f.id}" value="${f.val||''}" placeholder="0.00" oninput="upd('${f.id}',this.value)">`
      :f.type==='date'
      ?`<input type="date" class="ffinp" id="inp_${f.id}" value="${f._raw||''}" onchange="updDate('${f.id}',this.value)">`
      :`<input type="text" class="ffinp" id="inp_${f.id}" value="${f.val||''}" placeholder="${f.name}" oninput="upd('${f.id}',this.value)">`;
    const tfbox=f.type==='number'?`<div class="tbox" id="tf_${f.id}">${f.val?tafqeet(f.val,getFieldCur(f)):'أدخل رقماً'}</div>`:'';
    return`<div class="ffield"><div class="fflbl"><span class="badge ${typeBadge(f.type)}">${typeLabel(f.type)}</span> ${f.name}</div>${inp}${tfbox}</div>`;
  }).join('');
}

function upd(id,v){
  const f=fields.find(x=>x.id===id);if(!f)return;f.val=v;
  if(f.type==='number'){
    const tb=document.getElementById('tf_'+id);
    if(tb)tb.textContent=v?tafqeet(v,getFieldCur(f)):'أدخل رقماً';
    fields.filter(x=>x.type==='tafqeet'&&x.linkTo===id).forEach(tf=>{
      const el=document.getElementById('atf_'+tf.id);
      if(el)el.textContent=v?tafqeet(v,getFieldCur(f)):'يُملأ تلقائياً';
    });
  }
  renderOverlays();
}
function updDate(id,v){
  const f=fields.find(x=>x.id===id);if(!f||!v)return;
  f._raw=v;
  f.val=new Date(v).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
  renderOverlays();
}
function clearVals(){
  if(!confirm('مسح جميع البيانات المدخلة؟'))return;
  fields.forEach(f=>{f.val='';f._raw='';});
  renderFillForm(); renderOverlays();
}

// ══ Print ══
async function printA4(){
  toast('جاري تجهيز الطباعة...');
  const A4W=794,A4H=1123,scaleX=A4W/imgW,scaleY=A4H/imgH;
  const imgs=[];
  for(let p=1;p<=pages;p++){
    const pg=await pdf.getPage(p);
    const vp=pg.getViewport({scale:2.5});
    const oc=document.createElement('canvas');oc.width=vp.width;oc.height=vp.height;
    await pg.render({canvasContext:oc.getContext('2d'),viewport:vp}).promise;
    const blob=await new Promise(r=>oc.toBlob(r,'image/png'));
    imgs.push(URL.createObjectURL(blob));
  }
  const pagesHTML=imgs.map((src,i)=>{
    const pg=i+1;
    const overlays=fields.filter(f=>f.pg===pg).map(f=>{
      const val=getVal(f);if(!val)return'';
      return`<div style="position:absolute;left:${Math.round(f.x*scaleX)}px;top:${Math.round(f.y*scaleY)}px;width:${Math.round(f.w*scaleX)}px;height:${Math.round(f.h*scaleY)}px;font-size:${Math.round(f.fs*Math.min(scaleX,scaleY))}px;color:${f.col};text-align:${f.align};direction:rtl;font-family:Tahoma,Arial,sans-serif;overflow:hidden;padding:2px 4px;line-height:1.3;box-sizing:border-box;">${val}</div>`;
    }).join('');
    return`<div style="position:relative;width:${A4W}px;height:${A4H}px;${i<pages-1?'page-break-after:always;':''}overflow:hidden;"><img src="${src}" style="width:${A4W}px;height:${A4H}px;display:block;">${overlays}</div>`;
  }).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:white}@page{size:A4 portrait;margin:0}</style></head><body>${pagesHTML}<script>window.onload=function(){window.print();window.onafterprint=function(){window.close();};}<\/script></body></html>`);
  win.document.close();
}

let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2800);}
</script>
</body>
</html>
